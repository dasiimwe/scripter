{% extends "base_op.html" %}
{% block title %}Edit {{ output.name }} · Outputs{% endblock %}
{% block content %}
<div class="op-page">
  <h1 class="op-title">Edit output</h1>
  <p class="op-sub">
    {% if output.original_script %}from {{ output.original_script.name }} · {% endif %}
    generated {{ output.created_at.strftime('%Y-%m-%d %H:%M') }}
  </p>

  <form method="post">
    <div class="field">
      <label>Name</label>
      <input type="text" name="name" value="{{ output.name }}" required>
    </div>
    <div class="field">
      <label>Content</label>
      <textarea name="content" class="code-edit" spellcheck="false" style="min-height:420px">{{ output.generated_content }}</textarea>
    </div>
    <div class="actions">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ url_for('outputs_view', output_id=output.id) }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
