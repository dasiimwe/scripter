{% extends "base.html" %}

{% block title %}Scripter - Create New Script{% endblock %}

{% block content %}
<!-- Breadcrumbs -->
<nav class="breadcrumb" aria-label="breadcrumbs">
    <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('admin_scripts') }}">Scripts</a></li>
        <li class="is-active"><a href="#" aria-current="page">Create New Script</a></li>
    </ul>
</nav>

<h1 class="title">Create New Script</h1>

<div class="box">
    <form method="POST" action="{{ url_for('create_script') }}">
        <div class="field">
            <label class="label">Name</label>
            <div class="control">
                <input class="input" type="text" name="name" required>
            </div>
            <p class="help">The name of the script as it will appear to users</p>
        </div>
        
        <div class="field is-grouped">
            <div class="control">
                <button type="submit" class="button is-primary">Create Script</button>
            </div>
            <div class="control">
                <a href="{{ url_for('admin_scripts') }}" class="button is-light">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
