{% extends "base.html" %}

{% block title %}Scripter - Edit Script{% endblock %}

{% block content %}
<h1 class="title">Edit Script: {{ script.name }}</h1>

<div class="tabs">
    <ul>
        <li class="is-active"><a>Details</a></li>
        <li><a href="{{ url_for('edit_template', script_id=script.id) }}">Template</a></li>
        <li><a href="{{ url_for('manage_fields', script_id=script.id) }}">Form Fields</a></li>
    </ul>
</div>

<div class="box">
    <form method="POST" action="{{ url_for('edit_script', script_id=script.id) }}">
        <div class="field">
            <label class="label">Name</label>
            <div class="control">
                <input class="input" type="text" name="name" value="{{ script.name }}" required>
            </div>
        </div>
        
        <div class="field">
            <label class="label">Description</label>
            <div class="control">
                <textarea class="textarea" name="description">{{ script.description }}</textarea>
            </div>
        </div>
        
        <div class="field">
            <label class="label">Category</label>
            <div class="control">
                <input class="input" type="text" name="category" value="{{ script.category }}">
            </div>
        </div>
        
        <div class="field">
            <label class="label">Tags</label>
            <div class="control">
                <input class="input" type="text" name="tags" value="{{ script.tags }}">
            </div>
        </div>
        
        <div class="field">
            <label class="label">Status</label>
            <div class="control">
                <div class="select">
                    <select name="status">
                        <option value="draft" {% if script.status == 'draft' %}selected{% endif %}>Draft</option>
                        <option value="active" {% if script.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="archived" {% if script.status == 'archived' %}selected{% endif %}>Archived</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="field is-grouped">
            <div class="control">
                <button type="submit" class="button is-primary">Save Changes</button>
            </div>
            <div class="control">
                <a href="{{ url_for('admin_dashboard') }}" class="button is-light">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
